version: '3.8'

services:
  whatsapp-agent:
    build: .
    container_name: whatsapp-agent
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./memory/sessions:/app/memory/sessions
      - agent-db:/app/data
    networks:
      - n8n_default

volumes:
  agent-db:

networks:
  n8n_default:
    external: true
